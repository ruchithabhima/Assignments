<!DOCTYPE html>
<html>
    <head>
        <title>Registration Form</title>
        <link rel="stylesheet" href="external.css"
    </head>
    <body>
        <div class="container">
            <div class="left">
                <h1> Student <br/>Registration Form</h1>
            </div>
            <div class="right">
            <div class="card">
            
                <form >
                <center>
                <table  cellpadding="7">
                <tr><td><label >Name</label></td>
                <td><input type="text" placeholder="Enter your Name" required></td>
                </tr>
                <tr><td><label >Email</label></td>
                <td><input type="text" placeholder="Enter your Email" required></td></tr>
                <tr><td><label>Password</label></td>
                <td><input type="password" minlength="6" placeholder="Enter your password" required></td></tr>
                <tr><td><label>Phone Number</label></td>
                    <td><input type="number" max="10" placeholder="Enter your PhNo" required></td></tr>
                <tr><td><label>Age</label></td>
                <td><input type="number" min="1" max="100" placeholder="Enter age" required></td></tr>
                <tr><td><label> Date of Birth</label></td>
                <td><input type="date"></td></tr>
                <tr><td  valign="top">skills</td>
                <td><input type="checkbox"><label>HTML</label><br/>
                    <input type="checkbox"><label>CSS</label><br/>
                    <input type="checkbox"><label>Javascript</label><br/>
                    <input type="checkbox"><label>React</label><br/>
                    <input type="checkbox"><label>Node Js</label><br/>
                    <input type="checkbox"><label>Express js</label><br/>
                </td>
            </tr>
            <tr><td colspan="2" align="center" ><button type="submit">Register</button></td></tr>
                </table>
                </center>
            </form>
            </div>
            </div>
        </div>
    </body>
</html>
