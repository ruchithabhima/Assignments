<!DOCTYPE html>
<html>
    <head>
        <title>Registration Form</title>
        <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous"> 
   
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
     <link rel="stylesheet" href="external.css">
</head>
    <body>
       <div class="container vh-100 d-flex justify-content-center align-items-center">
    <div class="row  shadow">

        <div class="col-md-5 leftsection d-flex flex-column justify-content-center aign-items-center text-center">
            <h1>Student <br/>Regitration Form</h1>
            

            <button class="btn btn-outline-light rounded-pill px-5 mt-3">
                SIGN IN
            </button>
        </div>

        <div class="col-md-7 d-flex flex-column justify-content-center aign-items-center text-success p-5">

            <h1>Create Account</h1>

            
            
            <form>
                <input type="text" class="form-control" placeholder="Enter Your Name" mt-3 required>

                <input type="email" class="form-control mt-3"
                       placeholder="Enter Your Email">

                <input type="password" class="form-control mt-3"
                       placeholder="Password" maxlength="10" minlength="6">
                
               <input type="tel" class="form-control mt-3" placeholder="Phone number" required maxlength="10" >
               <div class="text-center">
                <button class="btn btn-success rounded-pill mt-4 px-5">
                    Register
                </button>
                </div>
            </form>

        </div>

    </div>
</div>
    </body>
</html>
